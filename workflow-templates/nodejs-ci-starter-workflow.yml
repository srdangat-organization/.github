name: Organization NodeJS CI

on:
  push:
    branches: [ $default-branch ]
  pull_request:
    branches: [ $default-branch ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      
      - name: Checkout Repo
        uses: actions/checkout@v7

      - name: Setup NodeJS Version
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install